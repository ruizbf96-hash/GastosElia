<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Gastos — Elia (Edición Avanzada)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyAI1LJ4w5B23knDWB0c_M2QC3xwxX_qAOg",
  authDomain: "gastos-elia.firebaseapp.com",
  projectId: "gastos-elia",
  storageBucket: "gastos-elia.firebasestorage.app",
  messagingSenderId: "1047223330489",
  appId: "1:1047223330489:web:7c7fde9791484f6cbf5d68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

window._fbSaveConfig = async function() {
  await db.collection('config').doc('main').set({
    members: state.members,
    paymentSources: state.paymentSources,
    categories: state.categories
  });
};

window._fbLoadConfig = async function() {
  const snap = await db.collection('config').doc('main').get();
  if (snap.exists) {
    const d = snap.data();
    state.members        = d.members        || ['Omar','Elia'];
    state.paymentSources = d.paymentSources || [...DEFAULT_PAYMENT_SOURCES];
    state.categories     = d.categories     || JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  }
};

window._fbSaveTransaction = async function(tx) {
  const { id, ...data } = tx;
  await db.collection('transactions').doc(id).set(data);
};

window._fbDeleteTransaction = async function(id) {
  await db.collection('transactions').doc(id).delete();
};

window._fbLoadTransactions = async function() {
  const snap = await db.collection('transactions').orderBy('date','desc').get();
  state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
};

window._firebaseReady = true;
if (window._appInitFn) window._appInitFn();
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #181b24; --surface2: #1f2333; --border: #2a2f45;
    --accent: #6c8fff; --accent2: #ff7c6e; --green: #4ecb8d; --yellow: #f5c542;
    --text: #e8eaf0; --muted: #7a839c; --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--accent); }
  .logo span { color: var(--accent2); }

  .nav-tabs { display: flex; gap: 0.2rem; padding: 1rem 2rem 0; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab-btn { background: none; border: none; color: var(--muted); padding: 0.6rem 1.2rem; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; font-size: 0.88rem; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg); }

  main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; position: relative; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-card.income::before { background: var(--green); }
  .kpi-card.expense::before { background: var(--accent2); }
  .kpi-card.balance::before { background: var(--accent); }
  .kpi-card.savings::before { background: var(--yellow); }
  .kpi-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
  .kpi-value { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
  
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

  .table-filters { display: flex; gap: 0.8rem; margin-bottom: 1rem; align-items: center; }
  .filter-select, .search-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.9rem; border-radius: 8px; font-size: 0.85rem; outline: none; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 0.8rem; text-align: left; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody td { padding: 0.5rem 0.8rem; font-size: 0.85rem; vertical-align: middle; }

  /* ESTILOS EDICION DIRECTA */
  .edit-input, .edit-select {
    width: 100%; background: transparent; border: 1px solid transparent; color: var(--text);
    padding: 0.4rem; border-radius: 4px; font-size: 0.85rem; font-family: inherit; outline: none; transition: 0.2s;
  }
  .edit-input:hover, .edit-select:hover { border-color: var(--border); background: var(--surface2); }
  .edit-input:focus, .edit-select:focus { border-color: var(--accent); background: var(--surface2); }
  .edit-amount { font-weight: 600; text-align: right; }
  .type-badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; font-weight: 700; }
  .type-income { background: rgba(78,203,141,0.15); color: var(--green); }
  .type-expense { background: rgba(255,124,110,0.15); color: var(--accent2); }

  .btn-save-row { opacity: 0; transition: 0.3s; background: var(--accent); border: none; color: white; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
  tr:hover .btn-save-row { opacity: 1; }
  tr.dirty { background: rgba(108,143,255,0.05); }

  .btn-primary { background: var(--accent); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 1px solid var(--accent); padding: 1rem 1.5rem; border-radius: 10px; z-index: 1000; display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Gastos<span>Elia</span></div>
  <div class="header-right">
    <select id="headerMemberSelector" class="filter-select" onchange="state.currentMember = this.value; renderAll();"></select>
  </div>
</header>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard')">Resumen</button>
  <button class="tab-btn" onclick="switchTab('add')">Nueva Transacción</button>
  <button class="tab-btn" onclick="switchTab('transactions')">Transacciones</button>
  <button class="tab-btn" onclick="switchTab('config')">Configuración</button>
</div>

<main>
  <div id="tab-dashboard" class="tab-content active">
    <div class="section-title"><span class="dot"></span> Vista General</div>
    <div class="table-filters" style="margin-bottom: 1.5rem;">
       <label style="font-size: 0.8rem; color: var(--muted);">Filtrar mes:</label>
       <select id="dashMonthFilter" class="filter-select" onchange="renderDashboard()"></select>
    </div>
    <div id="kpiGrid" class="kpi-grid"></div>
    <div id="dashboardCharts" style="margin-top:2rem;">
       </div>
  </div>

  <div id="tab-add" class="tab-content">
    <div class="section-title"><span class="dot"></span> Agregar Datos</div>
    <div class="form-card">
      <p style="font-size:0.85rem; color:var(--muted); margin-bottom:1rem;">💡 Puedes pegar datos directamente desde Excel o Google Sheets aquí o en la tabla de transacciones.</p>
      <textarea id="pasteArea" class="search-input" style="width:100%; height:80px; margin-bottom:1rem;" placeholder="Pega filas de Excel aquí..."></textarea>
      <button class="btn-primary" onclick="processPaste(document.getElementById('pasteArea').value)">Procesar Pegado</button>
    </div>
  </div>

  <div id="tab-transactions" class="tab-content">
    <div class="section-title"><span class="dot"></span> Historial Editable</div>
    <div class="table-filters">
      <select id="filterMonth" class="filter-select" onchange="renderTransactions()"></select>
      <select id="filterType" class="filter-select" onchange="renderTransactions()">
        <option value="">Todos los tipos</option>
        <option value="income">Pagos</option>
        <option value="expense">Gastos</option>
      </select>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar..." oninput="renderTransactions()">
    </div>
    <div class="table-wrap">
      <table id="mainTxTable">
        <thead>
          <tr>
            <th style="width:120px;">Fecha</th>
            <th style="width:100px;">Persona</th>
            <th style="width:80px;">Tipo</th>
            <th>Fuente</th>
            <th>Categoría</th>
            <th>Subcategoría</th>
            <th>Descripción</th>
            <th style="text-align:right; width:110px;">Monto</th>
            <th style="width:60px;"></th>
          </tr>
        </thead>
        <tbody id="txTableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-config" class="tab-content">
    <div class="section-title"><span class="dot"></span> Configuración</div>
    <div id="configContent"></div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
// ==================== STATE & DEFAULTS ====================
const state = {
  transactions: [],
  members: ['Omar', 'Elia'],
  currentMember: '',
  categories: {
    income: { 'Transferencia': ['BBVA', 'Mercado Pago'], 'Efectivo': ['Retiro'] },
    expense: { 'Medicamentos': ['Farmacia', 'Recetados'], 'Alimentación': ['Despensa', 'Restaurante'] }
  },
  paymentSources: ['Efectivo', 'Tarjeta BBVA', 'Mercado Pago']
};

const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// ==================== CORE FUNCTIONS ====================
async function load() {
  if (window._fbLoadConfig) await window._fbLoadConfig();
  if (window._fbLoadTransactions) await window._fbLoadTransactions();
  populateFilters();
  renderAll();
}

function renderAll() {
  renderMemberSelectors();
  renderDashboard();
  renderTransactions();
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.toLowerCase().includes(name==='dashboard'?'resumen':name==='add'?'nueva':name));
  if (btn) btn.classList.add('active');
}

// ==================== FILTROS DINÁMICOS ====================
function populateFilters() {
  const months = [...new Set(state.transactions.map(t => t.date.substring(0, 7)))].sort().reverse();
  const options = '<option value="">Todos los meses</option>' + months.map(m => {
    const [y, mm] = m.split('-');
    return `<option value="${m}">${MESES[parseInt(mm)-1]} ${y}</option>`;
  }).join('');
  
  document.getElementById('filterMonth').innerHTML = options;
  document.getElementById('dashMonthFilter').innerHTML = options;
}

function renderMemberSelectors() {
  const html = '<option value="">Todos</option>' + state.members.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('headerMemberSelector').innerHTML = html;
}

// ==================== DASHBOARD CON FILTRO MES-AÑO ====================
function renderDashboard() {
  const monthFilter = document.getElementById('dashMonthFilter').value;
  const memFilter = state.currentMember;
  
  const filtered = state.transactions.filter(t => {
    if (monthFilter && !t.date.startsWith(monthFilter)) return false;
    if (memFilter && t.member !== memFilter) return false;
    return true;
  });

  const inc = filtered.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
  const exp = filtered.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
  const bal = inc - exp;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card income"><div class="kpi-label">Ingresos</div><div class="kpi-value" style="color:var(--green)">$${inc.toLocaleString()}</div></div>
    <div class="kpi-card expense"><div class="kpi-label">Gastos</div><div class="kpi-value" style="color:var(--accent2)">$${exp.toLocaleString()}</div></div>
    <div class="kpi-card balance"><div class="kpi-label">Saldo</div><div class="kpi-value" style="color:var(--accent)">$${bal.toLocaleString()}</div></div>
    <div class="kpi-card savings"><div class="kpi-label">% Disponible</div><div class="kpi-value" style="color:var(--yellow)">${inc>0 ? ((bal/inc)*100).toFixed(1) : 0}%</div></div>
  `;
}

// ==================== TABLA EDITABLE ====================
function renderTransactions() {
  const tbody = document.getElementById('txTableBody');
  const mFilter = document.getElementById('filterMonth').value;
  const tFilter = document.getElementById('filterType').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = state.transactions.filter(t => {
    if (mFilter && !t.date.startsWith(mFilter)) return false;
    if (tFilter && t.type !== tFilter) return false;
    if (search && !Object.values(t).some(v => String(v).toLowerCase().includes(search))) return false;
    return true;
  });

  tbody.innerHTML = filtered.map(t => `
    <tr id="row-${t.id}">
      <td><input type="date" class="edit-input" value="${t.date}" onchange="updateLocal('${t.id}', 'date', this.value)"></td>
      <td>
        <select class="edit-select" onchange="updateLocal('${t.id}', 'member', this.value)">
          ${state.members.map(m => `<option value="${m}" ${m===t.member?'selected':''}>${m}</option>`).join('')}
        </select>
      </td>
      <td>
        <span class="type-badge ${t.type==='income'?'type-income':'type-expense'}" onclick="toggleType('${t.id}')">
          ${t.type==='income'?'Pago':'Gasto'}
        </span>
      </td>
      <td>
        <select class="edit-select" onchange="updateLocal('${t.id}', 'paymentSource', this.value)">
          ${state.paymentSources.map(s => `<option value="${s}" ${s===t.paymentSource?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="edit-select" onchange="updateCategoryLocal('${t.id}', this.value)">
          ${Object.keys(state.categories[t.type]).map(c => `<option value="${c}" ${c===t.category?'selected':''}>${c}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="edit-select" id="sub-${t.id}" onchange="updateLocal('${t.id}', 'subcategory', this.value)">
          ${(state.categories[t.type][t.category] || []).map(s => `<option value="${s}" ${s===t.subcategory?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td><input type="text" class="edit-input" value="${t.desc||''}" onchange="updateLocal('${t.id}', 'desc', this.value)"></td>
      <td><input type="number" class="edit-input edit-amount" value="${t.amount}" onchange="updateLocal('${t.id}', 'amount', parseFloat(this.value))"></td>
      <td><button class="btn-save-row" onclick="saveRow('${t.id}')">Guardar</button></td>
    </tr>
  `).join('');
}

function updateLocal(id, field, value) {
  const tx = state.transactions.find(t => t.id === id);
  if (tx) {
    tx[field] = value;
    document.getElementById(`row-${id}`).classList.add('dirty');
  }
}

function updateCategoryLocal(id, cat) {
  const tx = state.transactions.find(t => t.id === id);
  tx.category = cat;
  const subs = state.categories[tx.type][cat] || [];
  tx.subcategory = subs[0] || '';
  renderTransactions(); // Refrescar para cargar nuevas subcategorías
  document.getElementById(`row-${id}`).classList.add('dirty');
}

function toggleType(id) {
  const tx = state.transactions.find(t => t.id === id);
  tx.type = tx.type === 'income' ? 'expense' : 'income';
  tx.category = Object.keys(state.categories[tx.type])[0];
  tx.subcategory = state.categories[tx.type][tx.category][0];
  renderTransactions();
  document.getElementById(`row-${id}`).classList.add('dirty');
}

async function saveRow(id) {
  const tx = state.transactions.find(t => t.id === id);
  if (window._fbSaveTransaction) await window._fbSaveTransaction(tx);
  document.getElementById(`row-${id}`).classList.remove('dirty');
  showToast("Cambios guardados");
  renderDashboard();
}

// ==================== SOPORTE PARA PEGAR EXCEL ====================
window.addEventListener('paste', e => {
  // Solo procesar si no se está escribiendo en un input de texto normal
  if (e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && e.target.type === 'text')) return;
  const data = e.clipboardData.getData('text');
  if (data.includes('\t')) processPaste(data);
});

async function processPaste(text) {
  const rows = text.trim().split('\n');
  let count = 0;
  
  for (let row of rows) {
    const cols = row.split('\t');
    if (cols.length < 2) continue;

    // Mapeo básico inteligente (Fecha, Persona, Tipo, Fuente, Cat, Subcat, Desc, Monto)
    const newTx = {
      id: 'tx_' + Date.now() + Math.random().toString(36).substr(2, 5),
      date: cols[0] || new Date().toISOString().split('T')[0],
      member: cols[1] || state.members[0],
      type: (cols[2] || '').toLowerCase().includes('pago') ? 'income' : 'expense',
      paymentSource: cols[3] || state.paymentSources[0],
      category: cols[4] || '',
      subcategory: cols[5] || '',
      desc: cols[6] || '',
      amount: parseFloat((cols[7] || '0').replace(/[^0-9.-]+/g,"")) || 0
    };

    state.transactions.push(newTx);
    if (window._fbSaveTransaction) await window._fbSaveTransaction(newTx);
    count++;
  }

  if (count > 0) {
    showToast(`Se han importado ${count} filas`);
    load();
    switchTab('transactions');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Inicialización
window._appInitFn = load;
if (window._firebaseReady) load();

</script>
</body>
</html>
